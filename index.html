<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>BatiTrack — Suivi des coûts main d'œuvre</title>

  <!-- CSP -->
  <!--
    The placeholder above is replaced by vite.config.js (inject-csp plugin).
    Strict CSP in production (no 'unsafe-eval', no inline scripts).
    Relaxed CSP in dev so Vite HMR works.

    HTTP headers that should be set when migrating off GitHub Pages
    (Cloudflare Pages / Vercel / Netlify):
      Strict-Transport-Security: max-age=63072000; includeSubDomains; preload
      X-Frame-Options: DENY
      Referrer-Policy: strict-origin-when-cross-origin
      Permissions-Policy: camera=(), microphone=(), geolocation=()
    GitHub Pages cannot set these; document via runbook until then.
  -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="robots" content="noindex,nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Naskh+Arabic:wght@500;700&display=swap" rel="stylesheet">
</head>

  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
